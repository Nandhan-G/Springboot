name: Spring Boot CI/CD to EC2

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout repository
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2️⃣ Setup Java 17
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      # 3️⃣ Build Application
      - name: Build with Maven
        run: mvn clean package -DskipTests

      # 4️⃣ Verify JAR Exists
      - name: Verify JAR
        run: ls -la target

      # 5️⃣ Copy JAR to EC2
      - name: Copy JAR to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          source: "target/springboot-hello-0.0.1-SNAPSHOT.jar"
          target: "/home/ec2-user/app/"

      # 6️⃣ Restart Application on EC2
      - name: Restart Application
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          script: |
            cd /home/ec2-user/app
            pkill -f 'springboot-hello' || true
            nohup java -jar springboot-hello-0.0.1-SNAPSHOT.jar > app.log 2>&1 &
